<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dr. Erkens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a5c4c;
            --primary-light: #2d8a6e;
            --accent: #c9a962;
            --text: #1a1a2e;
            --bg: #fafaf8;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        .login-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 3rem;
            text-align: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            color: #666;
        }
        .tab.active {
            background: var(--white);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--primary-light);
        }
        .error {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
        .links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .links a {
            color: var(--primary);
            text-decoration: none;
        }
        .links a:hover { text-decoration: underline; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">Dr. Erkens</div>
            <p class="subtitle">Patientenportal</p>

            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">Anmelden</button>
                <button class="tab" onclick="showTab('register')">Registrieren</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>E-Mail</label>
                    <input type="email" id="loginEmail" required placeholder="ihre@email.de">
                </div>
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Anmelden</button>
                <p id="loginError" class="error"></p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="regName" required placeholder="Ihr vollständiger Name">
                </div>
                <div class="form-group">
                    <label>E-Mail</label>
                    <input type="email" id="regEmail" required placeholder="ihre@email.de">
                </div>
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="tel" id="regPhone" placeholder="Ihre Telefonnummer">
                </div>
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="regPassword" required placeholder="Mindestens 6 Zeichen">
                </div>
                <button type="submit" class="btn btn-primary">Konto erstellen</button>
                <p id="regError" class="error"></p>
            </form>
        </div>
        <a href="/" class="back-link">← Zurück zur Startseite</a>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    sessionStorage.setItem('session', data.sessionId);
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    errorEl.textContent = data.error;
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Verbindungsfehler';
                errorEl.style.display = 'block';
            }
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                password: document.getElementById('regPassword').value
            };
            const errorEl = document.getElementById('regError');
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.success) {
                    sessionStorage.setItem('session', result.sessionId);
                    sessionStorage.setItem('user', JSON.stringify(result.user));
                    window.location.href = '/dashboard.html';
                } else {
                    errorEl.textContent = result.error;
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Verbindungsfehler';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
