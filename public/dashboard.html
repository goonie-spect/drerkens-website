<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Dr. Erkens</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a5c4c;
            --primary-light: #2d8a6e;
            --accent: #c9a962;
            --text: #1a1a2e;
            --bg: #fafaf8;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
        }
        .navbar {
            background: var(--white);
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--primary);
            text-decoration: none;
        }
        .nav-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-user span { font-weight: 500; }
        .btn-logout {
            background: none;
            border: 2px solid #ddd;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .btn-logout:hover { border-color: #dc3545; color: #dc3545; }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .header {
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            color: var(--primary);
        }
        .header p { color: #666; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .stat-card h3 {
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-family: 'Inter', sans-serif;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Playfair Display', serif;
        }

        .section {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        .appointments-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .appointment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--bg);
            border-radius: 10px;
            border-left: 4px solid var(--primary);
        }
        .apt-info h4 { font-size: 1rem; margin-bottom: 0.25rem; }
        .apt-info p { color: #666; font-size: 0.85rem; }
        .apt-status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .status-offen { background: #fff3cd; color: #856404; }
        .status-bestätigt { background: #d4edda; color: #155724; }
        .status-abgesagt { background: #f8d7da; color: #721c24; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-outline { background: none; border: 2px solid #ddd; color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: var(--white);
            padding: 1rem 2rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .appointment-item { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Dr. Erkens</a>
            <div class="nav-user">
                <span id="userName">Patient</span>
                <button class="btn-logout" onclick="logout()">Abmelden</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Willkommen, <span id="displayName"></span></h1>
            <p>Verwalten Sie Ihre Termine und persönlichen Daten.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Meine Termine</h3>
                <div class="value" id="aptCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Nächster Termin</h3>
                <div class="value" id="nextApt" style="font-size: 1.2rem;">Keiner</div>
            </div>
            <div class="stat-card">
                <h3>Konto seit</h3>
                <div class="value" id="memberSince" style="font-size: 1.2rem;">-</div>
            </div>
        </div>

        <div class="section">
            <h2>Meine Termine</h2>
            <div id="appointmentsList" class="appointments-list">
                <div class="empty-state">
                    <div class="icon">📅</div>
                    <p>Noch keine Termine vorhanden.</p>
                </div>
            </div>
        </div>

        <div class="section" style="text-align: center;">
            <h2>Neuen Termin buchen</h2>
            <p style="color: #666; margin-bottom: 1.5rem;">Sie möchten einen neuen Termin vereinbaren?</p>
            <a href="/" class="btn btn-primary">Termin buchen →</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const session = sessionStorage.getItem('session');
        const user = JSON.parse(sessionStorage.getItem('user') || '{}');

        if (!session || !user.id) {
            window.location.href = '/login.html';
        }

        document.getElementById('userName').textContent = user.name || 'Patient';
        document.getElementById('displayName').textContent = user.name || 'Patient';
        document.getElementById('memberSince').textContent = new Date().toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });

        async function loadAppointments() {
            try {
                const res = await fetch('/api/appointments', {
                    headers: { 'Authorization': 'Bearer ' + session }
                });
                const all = await res.json();
                const myApts = all.filter(a => a.email === user.email);
                document.getElementById('aptCount').textContent = myApts.length;

                if (myApts.length > 0) {
                    const sorted = myApts.sort((a, b) => new Date(a.date) - new Date(b.date));
                    const next = sorted.find(a => new Date(a.date) >= new Date());
                    if (next) {
                        document.getElementById('nextApt').textContent = next.date;
                    }

                    document.getElementById('appointmentsList').innerHTML = myApts.map(a => `
                        <div class="appointment-item">
                            <div class="apt-info">
                                <h4>${a.service}</h4>
                                <p>${a.date} um ${a.time}</p>
                            </div>
                            <span class="apt-status status-${a.status}">${a.status}</span>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error(e);
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '/login.html';
        }

        loadAppointments();
    </script>
</body>
</html>
